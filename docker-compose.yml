services:
  app:
    image: gospelos:latest
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: gospelos
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: gospelos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gospelos -d gospelos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  uploads:
  pgdata:
